<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-dt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000510"/>
      <stop offset="100%" stop-color="#000a1a"/>
    </linearGradient>
    <linearGradient id="floor-dt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020508"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor-reflect" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-dt">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-dt)"/>

  <!-- Stage floor -->
  <rect x="0" y="320" width="800" height="130" fill="url(#floor-dt)"/>
  <!-- Floor reflection line -->
  <rect x="0" y="318" width="800" height="2" fill="#38bdf8" opacity="0.3"/>

  <!-- Left dramatic side beam -->
  <polygon points="-10,0 80,0 420,320 330,320" fill="#38bdf8" opacity="0.06"/>
  <polygon points="-10,0 60,0 400,320 310,320" fill="#7dd3fc" opacity="0.04"/>
  <!-- Beam core -->
  <polygon points="20,0 50,0 390,320 360,320" fill="#bae6fd" opacity="0.05" filter="url(#soft)"/>

  <!-- Right dramatic side beam -->
  <polygon points="810,0 720,0 380,320 470,320" fill="#38bdf8" opacity="0.06"/>
  <polygon points="810,0 740,0 400,320 490,320" fill="#7dd3fc" opacity="0.04"/>
  <!-- Beam core -->
  <polygon points="780,0 750,0 410,320 440,320" fill="#bae6fd" opacity="0.05" filter="url(#soft)"/>

  <!-- Vertical top light (center) -->
  <polygon points="360,0 440,0 430,320 370,320" fill="#e0f2fe" opacity="0.04"/>

  <!-- Center glow on dancer -->
  <ellipse cx="400" cy="280" rx="120" ry="140" fill="url(#center-glow)"/>

  <!-- Floor reflection glow -->
  <ellipse cx="400" cy="330" rx="180" ry="30" fill="url(#floor-reflect)"/>

  <!-- Dancer silhouette — arabesque/leap pose, very stylized -->
  <!-- Torso -->
  <ellipse cx="400" cy="250" rx="12" ry="20" fill="#000d20" transform="rotate(-10, 400, 250)"/>
  <!-- Head -->
  <circle cx="395" cy="224" r="11" fill="#000d20"/>
  <!-- Extended back leg (arabesque) -->
  <path d="M405,265 Q440,245 480,230 Q500,222 510,215" stroke="#000d20" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Front supporting leg -->
  <path d="M398,270 Q395,300 392,320" stroke="#000d20" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Extended front arm -->
  <path d="M392,238 Q360,220 330,208 Q315,202 305,198" stroke="#000d20" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Back arm -->
  <path d="M408,240 Q425,228 438,220" stroke="#000d20" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Tutu hint -->
  <ellipse cx="400" cy="270" rx="24" ry="8" fill="#000d20" opacity="0.7" transform="rotate(-8, 400, 270)"/>

  <!-- Dancer shadow/reflection on floor -->
  <ellipse cx="400" cy="322" rx="30" ry="8" fill="#38bdf8" opacity="0.12"/>

  <!-- Small particles / dust -->
  <g fill="#bae6fd" opacity="0.4">
    <circle cx="330" cy="210" r="1.5"/>
    <circle cx="355" cy="195" r="1"/>
    <circle cx="345" cy="225" r="1"/>
    <circle cx="460" cy="220" r="1.5"/>
    <circle cx="475" cy="240" r="1"/>
    <circle cx="420" cy="185" r="1"/>
    <circle cx="380" cy="200" r="1.5"/>
    <circle cx="440" cy="195" r="1"/>
  </g>

  <!-- Thin top beam lines -->
  <line x1="200" y1="0" x2="390" y2="320" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="0" x2="410" y2="320" stroke="#38bdf8" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="0" x2="400" y2="320" stroke="#e0f2fe" stroke-width="0.5" opacity="0.25"/>

  <!-- Subtle audience in darkness -->
  <g fill="#000810" opacity="0.8">
    <ellipse cx="80" cy="390" rx="25" ry="32"/>
    <ellipse cx="135" cy="393" rx="23" ry="30"/>
    <ellipse cx="188" cy="388" rx="24" ry="31"/>
    <ellipse cx="241" cy="392" rx="23" ry="30"/>
    <ellipse cx="295" cy="388" rx="24" ry="31"/>
    <ellipse cx="505" cy="392" rx="23" ry="30"/>
    <ellipse cx="559" cy="388" rx="24" ry="31"/>
    <ellipse cx="612" cy="392" rx="23" ry="30"/>
    <ellipse cx="665" cy="388" rx="24" ry="31"/>
    <ellipse cx="718" cy="392" rx="23" ry="30"/>
  </g>
</svg>
