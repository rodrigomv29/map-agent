<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky-ve" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="brick-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="100%" stop-color="#3d2218"/>
    </linearGradient>
    <linearGradient id="brick-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d2218"/>
      <stop offset="100%" stop-color="#2c1810"/>
    </linearGradient>
    <radialGradient id="marquee-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="street-lamp" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-ve">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky-ve)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="60" cy="30" r="1"/>
    <circle cx="130" cy="18" r="1"/>
    <circle cx="200" cy="45" r="1.5"/>
    <circle cx="660" cy="25" r="1"/>
    <circle cx="720" cy="42" r="1.5"/>
    <circle cx="750" cy="15" r="1"/>
  </g>

  <!-- Building facade main body -->
  <rect x="100" y="80" width="600" height="320" fill="url(#brick-l)"/>

  <!-- Brick texture rows (horizontal lines) -->
  <g stroke="#2a1508" stroke-width="1" opacity="0.4">
    <line x1="100" y1="100" x2="700" y2="100"/>
    <line x1="100" y1="118" x2="700" y2="118"/>
    <line x1="100" y1="136" x2="700" y2="136"/>
    <line x1="100" y1="154" x2="700" y2="154"/>
    <line x1="100" y1="172" x2="700" y2="172"/>
    <line x1="100" y1="190" x2="700" y2="190"/>
    <line x1="100" y1="208" x2="700" y2="208"/>
    <line x1="100" y1="226" x2="700" y2="226"/>
    <line x1="100" y1="244" x2="700" y2="244"/>
    <line x1="100" y1="262" x2="700" y2="262"/>
    <line x1="100" y1="280" x2="700" y2="280"/>
    <line x1="100" y1="298" x2="700" y2="298"/>
    <line x1="100" y1="316" x2="700" y2="316"/>
    <line x1="100" y1="334" x2="700" y2="334"/>
  </g>
  <!-- Vertical brick joints (staggered) -->
  <g stroke="#2a1508" stroke-width="0.5" opacity="0.25">
    <line x1="150" y1="80" x2="150" y2="400"/>
    <line x1="210" y1="80" x2="210" y2="400"/>
    <line x1="270" y1="80" x2="270" y2="400"/>
    <line x1="330" y1="80" x2="330" y2="400"/>
    <line x1="390" y1="80" x2="390" y2="400"/>
    <line x1="450" y1="80" x2="450" y2="400"/>
    <line x1="510" y1="80" x2="510" y2="400"/>
    <line x1="570" y1="80" x2="570" y2="400"/>
    <line x1="630" y1="80" x2="630" y2="400"/>
  </g>

  <!-- Roofline decorative parapet -->
  <rect x="100" y="72" width="600" height="16" fill="#4a2c1a"/>
  <g fill="#4a2c1a">
    <rect x="110" y="58" width="30" height="20"/>
    <rect x="160" y="58" width="30" height="20"/>
    <rect x="210" y="58" width="30" height="20"/>
    <rect x="260" y="58" width="30" height="20"/>
    <rect x="310" y="58" width="30" height="20"/>
    <rect x="360" y="58" width="30" height="20"/>
    <rect x="410" y="58" width="30" height="20"/>
    <rect x="460" y="58" width="30" height="20"/>
    <rect x="510" y="58" width="30" height="20"/>
    <rect x="560" y="58" width="30" height="20"/>
    <rect x="610" y="58" width="30" height="20"/>
    <rect x="660" y="58" width="30" height="20"/>
  </g>

  <!-- Marquee box -->
  <rect x="200" y="130" width="400" height="90" fill="#1a0f04" rx="4"/>
  <rect x="204" y="134" width="392" height="82" fill="#0d0802" rx="3"/>
  <!-- Marquee border lights -->
  <g fill="#fde68a" opacity="0.85">
    <circle cx="215" cy="144" r="4"/><circle cx="240" cy="144" r="4"/><circle cx="265" cy="144" r="4"/>
    <circle cx="290" cy="144" r="4"/><circle cx="315" cy="144" r="4"/><circle cx="340" cy="144" r="4"/>
    <circle cx="365" cy="144" r="4"/><circle cx="390" cy="144" r="4"/><circle cx="415" cy="144" r="4"/>
    <circle cx="440" cy="144" r="4"/><circle cx="465" cy="144" r="4"/><circle cx="490" cy="144" r="4"/>
    <circle cx="515" cy="144" r="4"/><circle cx="540" cy="144" r="4"/><circle cx="565" cy="144" r="4"/>
    <circle cx="585" cy="144" r="4"/>
    <!-- Bottom row -->
    <circle cx="215" cy="206" r="4"/><circle cx="240" cy="206" r="4"/><circle cx="265" cy="206" r="4"/>
    <circle cx="290" cy="206" r="4"/><circle cx="315" cy="206" r="4"/><circle cx="340" cy="206" r="4"/>
    <circle cx="365" cy="206" r="4"/><circle cx="390" cy="206" r="4"/><circle cx="415" cy="206" r="4"/>
    <circle cx="440" cy="206" r="4"/><circle cx="465" cy="206" r="4"/><circle cx="490" cy="206" r="4"/>
    <circle cx="515" cy="206" r="4"/><circle cx="540" cy="206" r="4"/><circle cx="565" cy="206" r="4"/>
    <circle cx="585" cy="206" r="4"/>
  </g>
  <!-- Marquee glow -->
  <rect x="200" y="130" width="400" height="90" fill="url(#marquee-glow)" rx="4"/>
  <!-- Marquee text -->
  <text x="400" y="165" font-family="serif" font-size="18" font-weight="bold" fill="#fde68a" text-anchor="middle" letter-spacing="3">THE WELLMONT</text>
  <text x="400" y="192" font-family="serif" font-size="11" fill="#fbbf24" text-anchor="middle" letter-spacing="2">THEATER</text>

  <!-- Windows upper floor -->
  <g fill="#2a1f10">
    <rect x="130" y="100" width="60" height="50" rx="2"/>
    <rect x="220" y="100" width="60" height="50" rx="2"/>
    <rect x="520" y="100" width="60" height="50" rx="2"/>
    <rect x="610" y="100" width="60" height="50" rx="2"/>
  </g>
  <!-- Window warm glow -->
  <g fill="#f59e0b" opacity="0.15">
    <rect x="130" y="100" width="60" height="50" rx="2"/>
    <rect x="220" y="100" width="60" height="50" rx="2"/>
    <rect x="520" y="100" width="60" height="50" rx="2"/>
    <rect x="610" y="100" width="60" height="50" rx="2"/>
  </g>

  <!-- Main entrance doors -->
  <rect x="310" y="300" width="80" height="100" fill="#1a1008" rx="3"/>
  <rect x="410" y="300" width="80" height="100" fill="#1a1008" rx="3"/>
  <!-- Door frames -->
  <rect x="308" y="298" width="84" height="104" fill="none" stroke="#5a3a20" stroke-width="3" rx="3"/>
  <rect x="408" y="298" width="84" height="104" fill="none" stroke="#5a3a20" stroke-width="3" rx="3"/>
  <!-- Door handles -->
  <circle cx="385" cy="352" r="4" fill="#8a6a40"/>
  <circle cx="415" cy="352" r="4" fill="#8a6a40"/>
  <!-- Door warm light spill -->
  <ellipse cx="350" cy="400" rx="30" ry="8" fill="#f59e0b" opacity="0.15"/>
  <ellipse cx="450" cy="400" rx="30" ry="8" fill="#f59e0b" opacity="0.15"/>

  <!-- Awning -->
  <polygon points="280,260 520,260 540,300 260,300" fill="#1a0f04"/>
  <polygon points="280,260 520,260 520,265 280,265" fill="#fbbf24" opacity="0.6"/>

  <!-- Sidewalk -->
  <rect x="0" y="400" width="800" height="50" fill="#1c1c24"/>
  <rect x="0" y="398" width="800" height="4" fill="#252530"/>

  <!-- Street lamp left -->
  <rect x="80" y="260" width="6" height="140" fill="#2a2a35"/>
  <rect x="68" y="258" width="30" height="6" fill="#2a2a35" rx="2"/>
  <ellipse cx="80" cy="258" rx="18" ry="10" fill="#fde68a" opacity="0.3"/>
  <ellipse cx="80" cy="258" rx="8" ry="5" fill="#fde68a" opacity="0.7"/>

  <!-- Street lamp right -->
  <rect x="714" y="260" width="6" height="140" fill="#2a2a35"/>
  <rect x="702" y="258" width="30" height="6" fill="#2a2a35" rx="2"/>
  <ellipse cx="720" cy="258" rx="18" ry="10" fill="#fde68a" opacity="0.3"/>
  <ellipse cx="720" cy="258" rx="8" ry="5" fill="#fde68a" opacity="0.7"/>

  <!-- People outside (silhouettes) -->
  <g fill="#0d0d14">
    <ellipse cx="180" cy="415" rx="12" ry="16"/>
    <ellipse cx="180" cy="398" r="9" ry="9"/>
    <ellipse cx="230" cy="416" rx="11" ry="15"/>
    <ellipse cx="230" cy="400" r="8" ry="8"/>
    <ellipse cx="560" cy="415" rx="12" ry="16"/>
    <ellipse cx="560" cy="398" r="9" ry="9"/>
    <ellipse cx="610" cy="416" rx="11" ry="15"/>
    <ellipse cx="610" cy="400" r="8" ry="8"/>
    <ellipse cx="650" cy="415" rx="12" ry="16"/>
    <ellipse cx="650" cy="398" r="9" ry="9"/>
  </g>
</svg>
