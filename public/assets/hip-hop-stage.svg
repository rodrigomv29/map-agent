<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-hh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05010f"/>
      <stop offset="100%" stop-color="#1a0535"/>
    </linearGradient>
    <linearGradient id="stage-hh" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1060"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </linearGradient>
    <radialGradient id="spot-purple" cx="50%" cy="0%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spot-blue" cx="50%" cy="0%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-center" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-hh">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-hh)"/>

  <!-- Ambient purple glow top -->
  <ellipse cx="400" cy="-40" rx="320" ry="160" fill="#7c3aed" opacity="0.18"/>

  <!-- Left spotlight beam -->
  <polygon points="160,0 100,0 260,280 320,280" fill="#a855f7" opacity="0.08"/>
  <polygon points="160,0 100,0 260,280 320,280" fill="#a855f7" opacity="0.06" filter="url(#blur-hh)"/>

  <!-- Right spotlight beam -->
  <polygon points="640,0 700,0 540,280 480,280" fill="#a855f7" opacity="0.08"/>
  <polygon points="640,0 700,0 540,280 480,280" fill="#a855f7" opacity="0.06" filter="url(#blur-hh)"/>

  <!-- Center spotlight beam -->
  <polygon points="370,0 430,0 460,280 340,280" fill="#e879f9" opacity="0.10"/>

  <!-- Blue accent left -->
  <polygon points="80,0 40,0 180,260 220,260" fill="#60a5fa" opacity="0.07"/>
  <!-- Blue accent right -->
  <polygon points="720,0 760,0 620,260 580,260" fill="#60a5fa" opacity="0.07"/>

  <!-- Stage platform -->
  <rect x="80" y="290" width="640" height="30" fill="url(#stage-hh)" rx="2"/>
  <rect x="80" y="290" width="640" height="4" fill="#7c3aed" opacity="0.6"/>

  <!-- Stage floor glow -->
  <ellipse cx="400" cy="310" rx="300" ry="30" fill="url(#glow-center)"/>

  <!-- Haze at stage level -->
  <rect x="0" y="260" width="800" height="60" fill="#7c3aed" opacity="0.05"/>

  <!-- Microphone stand -->
  <rect x="396" y="210" width="3" height="75" fill="#d4d4d8" opacity="0.9"/>
  <rect x="385" y="278" width="25" height="3" fill="#d4d4d8" opacity="0.7"/>
  <ellipse cx="397" cy="208" rx="8" ry="12" fill="#a1a1aa" opacity="0.85"/>
  <ellipse cx="397" cy="204" rx="6" ry="8" fill="#71717a" opacity="0.9"/>

  <!-- Crowd silhouettes -->
  <!-- Row 1 (back, smaller) -->
  <g fill="#1e1033" opacity="0.9">
    <ellipse cx="100" cy="340" rx="18" ry="22"/>
    <ellipse cx="140" cy="342" rx="16" ry="20"/>
    <ellipse cx="178" cy="338" rx="17" ry="21"/>
    <ellipse cx="215" cy="341" rx="18" ry="22"/>
    <ellipse cx="252" cy="339" rx="16" ry="20"/>
    <ellipse cx="290" cy="342" rx="17" ry="21"/>
    <ellipse cx="328" cy="338" rx="18" ry="22"/>
    <ellipse cx="365" cy="341" rx="16" ry="21"/>
    <ellipse cx="402" cy="339" rx="17" ry="22"/>
    <ellipse cx="440" cy="342" rx="18" ry="20"/>
    <ellipse cx="478" cy="338" rx="16" ry="21"/>
    <ellipse cx="515" cy="341" rx="17" ry="22"/>
    <ellipse cx="552" cy="339" rx="18" ry="20"/>
    <ellipse cx="590" cy="342" rx="16" ry="21"/>
    <ellipse cx="628" cy="338" rx="17" ry="22"/>
    <ellipse cx="665" cy="341" rx="18" ry="20"/>
    <ellipse cx="700" cy="339" rx="16" ry="21"/>
  </g>
  <!-- Raised hands scattered -->
  <g fill="#2d1060" opacity="0.7">
    <rect x="130" y="318" width="4" height="18" rx="2"/>
    <rect x="265" y="316" width="4" height="20" rx="2"/>
    <rect x="455" y="318" width="4" height="18" rx="2"/>
    <rect x="610" y="315" width="4" height="22" rx="2"/>
    <rect x="350" y="317" width="4" height="19" rx="2"/>
  </g>

  <!-- Row 2 (front, larger) -->
  <g fill="#110826" opacity="0.95">
    <ellipse cx="60" cy="390" rx="28" ry="35"/>
    <ellipse cx="115" cy="393" rx="26" ry="33"/>
    <ellipse cx="170" cy="388" rx="27" ry="34"/>
    <ellipse cx="225" cy="392" rx="28" ry="35"/>
    <ellipse cx="278" cy="389" rx="26" ry="33"/>
    <ellipse cx="332" cy="392" rx="27" ry="34"/>
    <ellipse cx="386" cy="388" rx="28" ry="35"/>
    <ellipse cx="440" cy="392" rx="26" ry="33"/>
    <ellipse cx="494" cy="389" rx="27" ry="34"/>
    <ellipse cx="548" cy="392" rx="28" ry="35"/>
    <ellipse cx="602" cy="388" rx="26" ry="33"/>
    <ellipse cx="656" cy="392" rx="27" ry="34"/>
    <ellipse cx="710" cy="389" rx="28" ry="35"/>
    <ellipse cx="762" cy="392" rx="26" ry="33"/>
  </g>

  <!-- Purple rim lights on stage edge -->
  <rect x="80" y="288" width="640" height="2" fill="#c084fc" opacity="0.8"/>

  <!-- Top rigging bar -->
  <rect x="60" y="30" width="680" height="6" fill="#3f3f46" rx="1"/>
  <!-- Hanging lights -->
  <g fill="#e879f9" opacity="0.9">
    <circle cx="120" cy="46" r="5"/>
    <circle cx="200" cy="46" r="5"/>
    <circle cx="280" cy="46" r="5"/>
    <circle cx="360" cy="46" r="5"/>
    <circle cx="440" cy="46" r="5"/>
    <circle cx="520" cy="46" r="5"/>
    <circle cx="600" cy="46" r="5"/>
    <circle cx="680" cy="46" r="5"/>
  </g>
  <g fill="#60a5fa" opacity="0.8">
    <circle cx="160" cy="46" r="4"/>
    <circle cx="240" cy="46" r="4"/>
    <circle cx="400" cy="46" r="4"/>
    <circle cx="480" cy="46" r="4"/>
    <circle cx="560" cy="46" r="4"/>
    <circle cx="640" cy="46" r="4"/>
  </g>
</svg>
