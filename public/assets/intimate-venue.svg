<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-iv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#0d0400"/>
    </linearGradient>
    <linearGradient id="curtain-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3d0c00"/>
      <stop offset="100%" stop-color="#7c1d00"/>
    </linearGradient>
    <linearGradient id="curtain-r" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c1d00"/>
      <stop offset="100%" stop-color="#3d0c00"/>
    </linearGradient>
    <radialGradient id="stage-light" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm-glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-iv">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-iv)"/>

  <!-- Warm overhead glow -->
  <rect x="0" y="0" width="800" height="450" fill="url(#stage-light)"/>

  <!-- Left curtain -->
  <path d="M0,0 L180,0 L160,450 L0,450 Z" fill="url(#curtain-l)"/>
  <path d="M0,0 L140,0 Q160,100 150,200 Q140,300 155,450 L0,450 Z" fill="#2a0800" opacity="0.5"/>
  <!-- Curtain folds left -->
  <path d="M40,0 Q55,80 45,180 Q35,280 50,450" stroke="#5a1200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M80,0 Q95,90 85,200 Q75,310 90,450" stroke="#5a1200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M120,0 Q135,85 125,190 Q115,295 130,450" stroke="#5a1200" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Right curtain -->
  <path d="M800,0 L620,0 L640,450 L800,450 Z" fill="url(#curtain-r)"/>
  <path d="M800,0 L660,0 Q640,100 650,200 Q660,300 645,450 L800,450 Z" fill="#2a0800" opacity="0.5"/>
  <!-- Curtain folds right -->
  <path d="M760,0 Q745,80 755,180 Q765,280 750,450" stroke="#5a1200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M720,0 Q705,90 715,200 Q725,310 710,450" stroke="#5a1200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M680,0 Q665,85 675,190 Q685,295 670,450" stroke="#5a1200" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Stage floor -->
  <rect x="140" y="300" width="520" height="150" fill="#1a0900"/>
  <rect x="140" y="298" width="520" height="5" fill="#f59e0b" opacity="0.5"/>

  <!-- Stage warm glow floor -->
  <ellipse cx="400" cy="310" rx="240" ry="25" fill="url(#warm-glow)"/>

  <!-- String lights top -->
  <path d="M140,80 Q200,95 260,82 Q320,70 380,85 Q440,98 500,83 Q560,70 620,83 Q680,95 740,80" stroke="#fde68a" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Bulbs on string lights -->
  <g fill="#fde68a">
    <circle cx="155" cy="82" r="4" opacity="0.9"/>
    <circle cx="200" cy="94" r="4" opacity="0.9"/>
    <circle cx="250" cy="84" r="4" opacity="0.9"/>
    <circle cx="300" cy="76" r="4" opacity="0.9"/>
    <circle cx="350" cy="86" r="4" opacity="0.9"/>
    <circle cx="400" cy="96" r="4" opacity="0.9"/>
    <circle cx="450" cy="84" r="4" opacity="0.9"/>
    <circle cx="500" cy="76" r="4" opacity="0.9"/>
    <circle cx="550" cy="85" r="4" opacity="0.9"/>
    <circle cx="600" cy="76" r="4" opacity="0.9"/>
    <circle cx="645" cy="85" r="4" opacity="0.9"/>
    <circle cx="690" cy="95" r="4" opacity="0.9"/>
    <circle cx="730" cy="82" r="4" opacity="0.9"/>
  </g>
  <!-- Glow halos on bulbs -->
  <g fill="#fde68a" filter="url(#blur-iv)" opacity="0.5">
    <circle cx="155" cy="82" r="10"/>
    <circle cx="300" cy="76" r="10"/>
    <circle cx="400" cy="96" r="10"/>
    <circle cx="500" cy="76" r="10"/>
    <circle cx="645" cy="85" r="10"/>
  </g>

  <!-- Performer silhouette on stage -->
  <!-- Body -->
  <ellipse cx="400" cy="250" rx="14" ry="18" fill="#0d0400"/>
  <!-- Head -->
  <circle cx="400" cy="226" r="12" fill="#0d0400"/>
  <!-- Guitar shape -->
  <ellipse cx="418" cy="262" rx="10" ry="13" fill="#1a0800"/>
  <rect x="425" y="220" width="3" height="50" fill="#1a0800" rx="1"/>
  <!-- Microphone stand -->
  <rect x="384" y="210" width="2" height="70" fill="#3f3f46" opacity="0.8"/>
  <ellipse cx="385" cy="208" rx="5" ry="7" fill="#52525b" opacity="0.9"/>

  <!-- Warm spotlight cone on performer -->
  <polygon points="400,0 320,300 480,300" fill="#fbbf24" opacity="0.07"/>
  <polygon points="400,0 340,300 460,300" fill="#fbbf24" opacity="0.06"/>

  <!-- Small audience silhouettes -->
  <g fill="#0d0500" opacity="0.9">
    <ellipse cx="200" cy="360" rx="22" ry="28"/>
    <ellipse cx="250" cy="363" rx="20" ry="26"/>
    <ellipse cx="298" cy="358" rx="21" ry="27"/>
    <ellipse cx="346" cy="362" rx="22" ry="28"/>
    <ellipse cx="394" cy="358" rx="20" ry="26"/>
    <ellipse cx="442" cy="362" rx="21" ry="27"/>
    <ellipse cx="490" cy="358" rx="22" ry="28"/>
    <ellipse cx="538" cy="362" rx="20" ry="26"/>
    <ellipse cx="586" cy="358" rx="21" ry="27"/>
  </g>

  <!-- Candle/phone lights in audience -->
  <g fill="#fde68a" opacity="0.7">
    <circle cx="215" cy="340" r="2"/>
    <circle cx="310" cy="338" r="2"/>
    <circle cx="370" cy="341" r="2"/>
    <circle cx="430" cy="339" r="2"/>
    <circle cx="505" cy="337" r="2"/>
    <circle cx="560" cy="341" r="2"/>
  </g>
</svg>
